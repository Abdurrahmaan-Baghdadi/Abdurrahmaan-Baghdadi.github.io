<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roadrunner Roasts — Shop</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link href="assets/css/theme.css" rel="stylesheet" />
  <link href="assets/css/nav-menu.css" rel="stylesheet" />
  <link href="assets/css/shop.css" rel="stylesheet" />
  <style>
    .demo-banner { margin:0; border-radius:0; border-left:none; border-right:none; }
    .shop-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 20px 30px;
    }
    .shopItems {
      width: 280px;
      border: 2px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .imageSection { height: 200px; overflow: hidden; background: #eee; }
    .imageSection img { width: 100%; height: 100%; object-fit: cover; }
    .detailSection {
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #12213e;
      color: #fff;
      font-size: 13px;
    }
    .detailSection .item-name { font-weight: bold; }
    .detailSection .item-price { color: #df6335; font-weight: bold; }
    .add-cart-btn {
      width: 100%;
      padding: 8px;
      background-color: #df6335;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    .add-cart-btn:hover { background-color: #c0522a; }
    .add-cart-btn.added { background-color: #5a8a3a; }
    .category-header {
      width: 100%;
      padding: 6px 10px;
      margin-top: 10px;
      background: #12213e;
      color: #df6335;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .filter-bar { padding: 10px 30px; display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 14px;
      border: 2px solid #12213e;
      background: #fff;
      color: #12213e;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .filter-btn.active, .filter-btn:hover {
      background: #12213e;
      color: #fff;
    }
    .footer-contact { padding: 20px 30px; color: #555; font-size: 13px; text-align: center; }
  </style>
</head>
<body>

<div class="header">
  <h1>&nbsp;</h1>
  <div class="rightShift">
    <img src="assets/images/banner.jpg" alt="close-up of coffee beans" title="Site Banner" width="100%" />
    <h1 class="center">&nbsp;Roadrunner Roasts</h1>
  </div>
</div>

<div class="alert alert-info demo-banner">
  <strong>Demo Mode:</strong> Static demo of a PHP/MySQL application. Ordering is disabled; cart uses browser session data.
</div>

<div class="sidenav">
  <button role="presentation" class="active box dropdown-btn">&#9776;</button>
  <div class="dropdown-container">
    <a href="index.html"><button class="button navBox">Home</button></a>
    <a href="shop.html"><button class="button navBox">Shop</button></a>
    <a href="cart.html"><button class="button navBox">Cart <span class="cart-badge"></span></button></a>
    <a href="login.html"><button class="button navBox">Sign In</button></a>
  </div>
</div>

<div class="rightShift">
  <div class="filter-bar" id="filter-bar"></div>
  <div class="shop-grid" id="shop-grid"></div>
  <div class="footer-contact">
    Contact us: &nbsp; Email: RoadrunnerRoast@utsa.edu &nbsp; | &nbsp; Phone: 210-111-1111
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="assets/js/demo-data.js"></script>
<script src="assets/js/cart.js"></script>
<script>
  var activeFilter = 'All';

  function buildFilterBar() {
    var bar = document.getElementById('filter-bar');
    var filters = ['All'].concat(window.CATEGORIES);
    bar.innerHTML = filters.map(function(f) {
      return '<button class="filter-btn' + (f === activeFilter ? ' active' : '') +
             '" onclick="setFilter(\'' + f + '\')">' + f + '</button>';
    }).join('');
  }

  function setFilter(cat) {
    activeFilter = cat;
    buildFilterBar();
    buildShopGrid();
  }

  function buildShopGrid() {
    var grid = document.getElementById('shop-grid');
    var items = activeFilter === 'All'
      ? window.MENU_ITEMS
      : window.MENU_ITEMS.filter(function(i) { return i.category === activeFilter; });

    var html = '';
    var lastCat = null;
    items.forEach(function(item) {
      if (activeFilter === 'All' && item.category !== lastCat) {
        html += '<div class="category-header">' + item.category + '</div>';
        lastCat = item.category;
      }
      html += '<div class="shopItems">';
      html +=   '<div class="imageSection">';
      html +=     '<img src="assets/images/' + item.image + '" alt="' + item.name + '" />';
      html +=   '</div>';
      html +=   '<div class="detailSection">';
      html +=     '<span class="item-name">' + item.name + '</span>';
      html +=     '<span class="item-price">$' + item.price.toFixed(2) + '</span>';
      html +=   '</div>';
      html +=   '<button id="add-btn-' + item.id + '" class="add-cart-btn" onclick="addToCart(' + item.id + ')">Add to Cart</button>';
      html += '</div>';
    });
    grid.innerHTML = html;
    renderCartBadge();
  }

  document.addEventListener('DOMContentLoaded', function() {
    buildFilterBar();
    buildShopGrid();
  });

  var dropdown = document.getElementsByClassName("dropdown-btn");
  for (var i = 0; i < dropdown.length; i++) {
    dropdown[i].addEventListener("click", function() {
      this.classList.toggle("active");
      var dc = this.nextElementSibling;
      dc.style.display = (dc.style.display === "block") ? "none" : "block";
    });
  }
</script>
</body>
</html>
