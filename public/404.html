<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Abdurrahmaan Baghdadi - Portfolio</title>
    <script>
      // SPA redirect for GitHub Pages — encodes the path into a query param
      // so index.html can restore it before React Router initialises.
      // segmentCount = 0 because this is a root user/org Pages site.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
