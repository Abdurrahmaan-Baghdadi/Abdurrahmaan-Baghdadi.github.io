<?xml version="1.0" encoding="UTF-8"?>
<!--
  AB Banner — Terminal Circuit Aesthetic
  Inspired by Destiny 2: Terminal Circuit / Terminal Overload emblems
  Wide format: 600 × 160 px  (export at 2× → 1200 × 320 for retina)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="600" height="160" viewBox="0 0 600 160">
  <defs>

    <!-- ── Glow filters (matching site PortfolioIntro.tsx) ── -->
    <filter id="glow" x="-40%" y="-150%" width="180%" height="400%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-80%" y="-250%" width="260%" height="600%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-60%" width="120%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ── Gradients ── -->
    <radialGradient id="chipBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="viaPad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0ea5e9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>

    <!-- ── Grid patterns (matching site) ── -->
    <pattern id="gridSmall" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <pattern id="gridLarge" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#gridSmall)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.3"/>
    </pattern>

  </defs>

  <!-- ══════════════════════════════════════════════════════════
       LAYER 1 — Background
       ══════════════════════════════════════════════════════════ -->
  <rect width="600" height="160" fill="#030712"/>
  <rect width="600" height="160" fill="url(#gridLarge)"/>

  <!-- ── Edge connector traces (decorative PCB border pads) ── -->
  <line x1="0"   y1="56"  x2="14"  y2="56"  stroke="#0ea5e9" stroke-width="1.5" opacity="0.25"/>
  <line x1="0"   y1="104" x2="14"  y2="104" stroke="#0ea5e9" stroke-width="1.5" opacity="0.25"/>
  <line x1="586" y1="56"  x2="600" y2="56"  stroke="#0ea5e9" stroke-width="1.5" opacity="0.25"/>
  <line x1="586" y1="104" x2="600" y2="104" stroke="#0ea5e9" stroke-width="1.5" opacity="0.25"/>

  <!-- ══════════════════════════════════════════════════════════
       LAYER 2 — ASCII Art Text Block
       Font: Courier New (monospace), 13px → ~7.8px per char
       Lines at y = 44, 62, 80, 98, 116
       Left margin: x = 20
       70 chars per line
       ══════════════════════════════════════════════════════════ -->

  <!-- Line 1 ── top border with ◈ chip nodes -->
  <text x="20" y="44"
        font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#0ea5e9" xml:space="preserve">&#x2554;&#x2550;&#x2550;&#x2561; &#x25C8; &#x255E;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550; &#x25C8; &#x255E;&#x2550;&#x2550;&#x2557;</text>

  <!-- Line 2 ── name -->
  <text x="20" y="62"
        font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#22d3ee" xml:space="preserve">&#x2551; &gt;_ ABDURRAHMAAN  BAGHDADI                                    &#x2551;</text>

  <!-- Line 3 ── separator trace (dim, like dark base trace) -->
  <text x="20" y="80"
        font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#1e3a5f" xml:space="preserve">&#x2551;    &#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;     &#x2551;</text>

  <!-- Line 4 ── subtitle + Traveler orb -->
  <text x="20" y="98"
        font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#22d3ee" xml:space="preserve">&#x2551;    GRADUATE SWE  &#xB7;  UT AUSTIN  &#xB7;  AUSTIN, TX                 &#x25C9;   &#x2551;</text>

  <!-- Line 5 ── bottom border with status tag -->
  <text x="20" y="116"
        font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#0ea5e9" xml:space="preserve">&#x255A;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;[ SIGNAL : OPEN ]&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x255D;</text>

  <!-- ══════════════════════════════════════════════════════════
       LAYER 3 — Glow Overlays
       ══════════════════════════════════════════════════════════ -->

  <!-- ── Left ◈ chip node (line 1, char 5) ── -->
  <!-- cx = 20 + 5*7.8 + 3.9 = 62.9, cy = 44 - 4.5 = 39.5 -->
  <g filter="url(#strongGlow)">
    <circle cx="63" cy="40" r="7"  fill="url(#viaPad)" opacity="0.5"/>
    <circle cx="63" cy="40" r="3"  fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.7"/>
    <circle cx="63" cy="40" r="1"  fill="#22d3ee" opacity="1"/>
    <!-- Chip pins -->
    <rect x="55"  y="39.5" width="4"  height="1" fill="#22d3ee" opacity="0.6"/>
    <rect x="68"  y="39.5" width="4"  height="1" fill="#22d3ee" opacity="0.6"/>
    <rect x="62.5" y="32"  width="1"  height="4" fill="#22d3ee" opacity="0.6"/>
    <rect x="62.5" y="45"  width="1"  height="4" fill="#22d3ee" opacity="0.6"/>
  </g>

  <!-- ── Right ◈ chip node (line 1, char 64) ── -->
  <!-- cx = 20 + 64*7.8 + 3.9 = 523.1, cy = 40 -->
  <g filter="url(#strongGlow)">
    <circle cx="523" cy="40" r="7"  fill="url(#viaPad)" opacity="0.5"/>
    <circle cx="523" cy="40" r="3"  fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.7"/>
    <circle cx="523" cy="40" r="1"  fill="#22d3ee" opacity="1"/>
    <rect x="515"  y="39.5" width="4"  height="1" fill="#22d3ee" opacity="0.6"/>
    <rect x="528"  y="39.5" width="4"  height="1" fill="#22d3ee" opacity="0.6"/>
    <rect x="522.5" y="32"  width="1"  height="4" fill="#22d3ee" opacity="0.6"/>
    <rect x="522.5" y="45"  width="1"  height="4" fill="#22d3ee" opacity="0.6"/>
  </g>

  <!-- ── Traveler ◉ orb (line 4, char 63) ── -->
  <!-- cx = 20 + 63*7.8 + 3.9 = 515.3, cy = 98 - 4.5 = 93.5 -->
  <g filter="url(#glow)">
    <circle cx="515" cy="94" r="8"  fill="none" stroke="#1e3a5f" stroke-width="1.5" opacity="0.8"/>
    <circle cx="515" cy="94" r="4.5" fill="none" stroke="#0ea5e9" stroke-width="1"   opacity="0.8"/>
    <circle cx="515" cy="94" r="1.5" fill="#0ea5e9" opacity="1"/>
  </g>

  <!-- ── [ SIGNAL : OPEN ] status tag glow (line 5, char 30) ── -->
  <!-- x = 20 + 30*7.8 = 254. "[ SIGNAL : OPEN ]" is 18 chars -->
  <g filter="url(#textGlow)">
    <text x="254" y="116"
          font-family="'Courier New', Courier, monospace"
          font-size="13" fill="#7dd3fc" xml:space="preserve">[ SIGNAL : OPEN ]</text>
  </g>

  <!-- ── Bottom corner endpoint pads ── -->
  <g filter="url(#glow)">
    <circle cx="25"  cy="116" r="2" fill="#0ea5e9" opacity="0.5"/>
    <circle cx="575" cy="116" r="2" fill="#0ea5e9" opacity="0.5"/>
  </g>

  <!-- ── Data stream accent line below separator ── -->
  <line x1="28" y1="88" x2="570" y2="88" stroke="#1e3a5f" stroke-width="0.5" opacity="0.4"/>

</svg>
