<?xml version="1.0" encoding="UTF-8"?>
<!--
  AB Logo — Terminal Circuit Aesthetic
  Compact logo for Calendly top-left slot and other small placements
  320 × 120 px  (export at 2× → 640 × 240 for retina)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="320" height="120" viewBox="0 0 320 120">
  <defs>

    <!-- ── Glow filters ── -->
    <filter id="glow" x="-40%" y="-150%" width="180%" height="400%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-80%" y="-250%" width="260%" height="600%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tagGlow" x="-10%" y="-60%" width="120%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ── Gradients ── -->
    <radialGradient id="viaPad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0ea5e9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <!-- ══════════════════════════════════════════════════════
       LAYER 1 — Background (no grid at this size — too dense)
       ══════════════════════════════════════════════════════ -->
  <rect width="320" height="120" fill="#030712"/>

  <!-- Subtle vignette corners -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#030712" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0c1a2e" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="320" height="120" fill="url(#vignette)"/>

  <!-- ══════════════════════════════════════════════════════
       LAYER 2 — ASCII Art Text Block
       Font: Courier New (monospace), 12px → ~7.2px per char
       Lines at y = 36, 54, 72, 90
       Left margin: x = 16
       38 chars per line → display width ≈ 289px
       ══════════════════════════════════════════════════════ -->

  <!-- Line 1 ── top border with ◈ chip node -->
  <text x="16" y="36"
        font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#0ea5e9" xml:space="preserve">&#x2554;&#x2550;&#x2550;&#x2561; &#x25C8; &#x255E;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2557;</text>

  <!-- Line 2 ── name + Traveler orb -->
  <text x="16" y="54"
        font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#22d3ee" xml:space="preserve">&#x2551; &gt;_ ABDURRAHMAAN BAGHDADI    &#x25C9;    &#x2551;</text>

  <!-- Line 3 ── subtitle -->
  <text x="16" y="72"
        font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#22d3ee" xml:space="preserve">&#x2551;    GRADUATE SWE &#xB7; UT AUSTIN    &#x2551;</text>

  <!-- Line 4 ── bottom border with [ AB ] tag -->
  <text x="16" y="90"
        font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#0ea5e9" xml:space="preserve">&#x255A;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;[ AB ]&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x2550;&#x255D;</text>

  <!-- ══════════════════════════════════════════════════════
       LAYER 3 — Glow Overlays
       ══════════════════════════════════════════════════════ -->

  <!-- ── ◈ chip node (line 1, char 5) ── -->
  <!-- cx = 16 + 5*7.2 + 3.6 = 55.6, cy = 36 - 4 = 32 -->
  <g filter="url(#strongGlow)">
    <circle cx="56" cy="32" r="6"   fill="url(#viaPad)" opacity="0.5"/>
    <circle cx="56" cy="32" r="3"   fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.7"/>
    <circle cx="56" cy="32" r="1"   fill="#22d3ee" opacity="1"/>
    <!-- Chip pins -->
    <rect x="48"  y="31.5" width="4" height="1" fill="#22d3ee" opacity="0.6"/>
    <rect x="61"  y="31.5" width="4" height="1" fill="#22d3ee" opacity="0.6"/>
    <rect x="55.5" y="24"  width="1" height="4" fill="#22d3ee" opacity="0.6"/>
    <rect x="55.5" y="37"  width="1" height="4" fill="#22d3ee" opacity="0.6"/>
  </g>

  <!-- ── Traveler ◉ orb (line 2, char 30) ── -->
  <!-- cx = 16 + 30*7.2 + 3.6 = 235.6, cy = 54 - 4 = 50 -->
  <g filter="url(#glow)">
    <circle cx="236" cy="50" r="7"   fill="none" stroke="#1e3a5f" stroke-width="1.5" opacity="0.9"/>
    <circle cx="236" cy="50" r="4"   fill="none" stroke="#0ea5e9" stroke-width="1"   opacity="0.8"/>
    <circle cx="236" cy="50" r="1.5" fill="#0ea5e9" opacity="1"/>
  </g>

  <!-- ── [ AB ] tag glow (line 4, char 15) ── -->
  <!-- x = 16 + 15*7.2 = 124, y = 90 -->
  <g filter="url(#tagGlow)">
    <text x="124" y="90"
          font-family="'Courier New', Courier, monospace"
          font-size="12" fill="#7dd3fc" xml:space="preserve">[ AB ]</text>
  </g>

  <!-- ── Bottom corner endpoint pads ── -->
  <g filter="url(#glow)">
    <circle cx="20"  cy="90" r="1.5" fill="#0ea5e9" opacity="0.5"/>
    <circle cx="300" cy="90" r="1.5" fill="#0ea5e9" opacity="0.5"/>
  </g>

</svg>
