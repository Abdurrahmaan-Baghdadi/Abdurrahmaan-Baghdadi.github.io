<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/personalSiteLogo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdn.emailjs.com;
      style-src 'self' 'unsafe-inline';
      connect-src 'self' https://api.emailjs.com;
      img-src 'self' data: https:;
      frame-src 'self';
      font-src 'self' data:;
      object-src 'none';
      base-uri 'self';
    " />
    <title>Abdurrahmaan Baghdadi - Portfolio</title>
    <script>
      // Restore path encoded by 404.html redirect (GitHub Pages SPA fix)
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
